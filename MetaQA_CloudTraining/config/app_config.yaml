app:
  version: "v0.1.0"

server:
  host: "0.0.0.0"
  port: 8090
  debug: false
  python_cmd: ""

data:
  base_path: "./data"
  datasets_path: "./data/datasets"
  runs_path: "./data/runs"
  pretrained_path: "./data/pretrained"
  temp_path: "./data/temp"
  logs_path: "./data/logs"
  db_path: "./data/db"

training:
  python_cmd: ""
  default_epochs: 100
  default_batch: 16
  default_imgsz: 640
  default_lr0: 0.01
  default_val_ratio: 0.2
  default_split_seed: 42
  default_patience: 50

convert:
  python_export_cmd: ""
  tflite_format: "fp16"

runtime:
  conda_cmd: ""
  deploy_state_path: "./data/deploy_state.json"
  init_state_path: "./data/init_state.json"
  env_snapshot_dir: "./data/logs"

logging:
  level: "INFO"
  file: "./data/logs/app.log"
  max_size: "100 MB"
  backup_count: 10
